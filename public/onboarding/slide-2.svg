<svg viewBox="0 0 360 260" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Dark background -->
  <rect width="360" height="260" fill="#070d1a" rx="12"/>

  <!-- Grid lines -->
  <line x1="0" y1="65" x2="360" y2="65" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="0" y1="130" x2="360" y2="130" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="0" y1="195" x2="360" y2="195" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="90" y1="0" x2="90" y2="260" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="180" y1="0" x2="180" y2="260" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="270" y1="0" x2="270" y2="260" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Glow blob, purple for Walrus -->
  <ellipse cx="180" cy="120" rx="80" ry="50" fill="#a855f7" opacity="0.05"/>

  <!-- Document card (left) -->
  <rect x="20" y="70" width="84" height="110" rx="8" fill="#0d1629" stroke="#1e3a5f" stroke-width="1.2"/>
  <!-- Doc header bar -->
  <rect x="20" y="70" width="84" height="22" rx="8" fill="#112240"/>
  <rect x="20" y="82" width="84" height="10" rx="0" fill="#112240"/>
  <rect x="30" y="76" width="40" height="5" rx="2" fill="#3b82f6" opacity="0.7"/>
  <!-- Doc lines -->
  <rect x="30" y="102" width="64" height="4" rx="2" fill="#1e3a5f"/>
  <rect x="30" y="111" width="50" height="3" rx="1.5" fill="#162035"/>
  <rect x="30" y="119" width="56" height="3" rx="1.5" fill="#162035"/>
  <rect x="30" y="127" width="40" height="3" rx="1.5" fill="#162035"/>
  <rect x="30" y="135" width="48" height="3" rx="1.5" fill="#162035"/>
  <!-- Hash footer -->
  <rect x="20" y="156" width="84" height="18" rx="0" fill="#060d1a"/>
  <rect x="20" y="156" width="84" height="18" rx="4" fill="#060d1a" stroke="#1e293b" stroke-width="0.6"/>
  <text x="62" y="168" font-family="monospace" font-size="6" fill="#475569" text-anchor="middle">sha256:e3b0c4...</text>

  <!-- Arrow doc → Walrus -->
  <line x1="106" y1="125" x2="140" y2="125" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="140,125 132,121 132,129" fill="#a855f7"/>

  <!-- Walrus node (center) -->
  <circle cx="170" cy="125" r="30" fill="#0d1629" stroke="#a855f7" stroke-width="1.5"/>
  <!-- W lettermark -->
  <text x="170" y="122" font-family="monospace" font-size="20" fill="#a855f7" font-weight="700" text-anchor="middle">W</text>
  <text x="170" y="134" font-family="monospace" font-size="7" fill="#7c3aed" text-anchor="middle">Walrus DA</text>
  <!-- Orbit ring -->
  <ellipse cx="170" cy="125" rx="42" ry="16" stroke="#a855f7" stroke-width="0.7" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Arrow Walrus → Sui -->
  <line x1="202" y1="125" x2="236" y2="125" stroke="#c8ff00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="236,125 228,121 228,129" fill="#c8ff00"/>

  <!-- Sui object card (right) -->
  <rect x="238" y="86" width="96" height="78" rx="8" fill="#0d1629" stroke="#c8ff00" stroke-width="1.2"/>
  <!-- Header -->
  <rect x="238" y="86" width="96" height="22" rx="8" fill="#121e0a"/>
  <rect x="238" y="98" width="96" height="10" rx="0" fill="#121e0a"/>
  <rect x="248" y="91" width="34" height="12" rx="4" fill="#c8ff00" opacity="0.12"/>
  <circle cx="255" cy="97" r="3" fill="#c8ff00"/>
  <text x="261" y="100" font-family="monospace" font-size="7" fill="#c8ff00">Object</text>
  <!-- Field -->
  <text x="248" y="118" font-family="monospace" font-size="6.5" fill="#64748b">evidence_hash</text>
  <rect x="248" y="122" width="76" height="12" rx="3" fill="#0a1628"/>
  <text x="286" y="131" font-family="monospace" font-size="6" fill="#a855f7" text-anchor="middle">e3b0c4...8ae1</text>
  <text x="248" y="150" font-family="monospace" font-size="6.5" fill="#c8ff00">✓ content-verified</text>

  <!-- Bottom permanence bar -->
  <rect x="30" y="212" width="300" height="20" rx="6" fill="#0a1628" stroke="#1e293b" stroke-width="0.8"/>
  <circle cx="46" cy="222" r="4" fill="#a855f7" opacity="0.9"/>
  <text x="56" y="226" font-family="monospace" font-size="7" fill="#64748b">permanently sealed on Walrus</text>
  <text x="320" y="226" font-family="monospace" font-size="7" fill="#a855f7" text-anchor="end">immutable</text>
</svg>
